services:

  app:
    build: .
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - openhc_net
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    image: mariadb:11
    profiles:
      - with-db
    restart: unless-stopped
    networks:
      - openhc_net
    env_file: .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  openhc_net:
    driver: bridge

volumes:
  db_data:
  app_storage:
